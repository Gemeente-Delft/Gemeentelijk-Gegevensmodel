# Taskfile for automating the GGM deployment process
#
# Structuur conform v3.0.0; model wordt ingelezen via de XMI export.
#
# This Taskfile defines tasks for:
# - Validating tools and variables
# - Importing the XMI file into Crunch UML
# - Generating Excel specifications, Markdown documentation, and translations
# - Deploying documentation to GitHub Pages
#
# Usage:
# - Run `task --list` to see all available tasks.
# - Run `task <taskname>` to execute a specific task.
#
# Environment:
# - A `.env` file is used to load configuration variables like `VERSION`.
# - Ensure required tools are installed before running (`task prepare:check-tools`).
#
# Examples:
# - To perform a full deployment: `task full-deploy`
# - To generate translations: `task generate:translations`
# - To generate excel-file: `task generate:excel`
# - To generate documentation: `task generate:docs`
# - To publish documentation to GitHub Pages: `task publish:github`
#
# Author: Arjen Brienen
# Last Updated: 11 mei 2026
version: '3'

dotenv: ['.env']

vars:
  VERSION_DIR: "./{{.VERSION}}"
  PREVIOUS_VERSION_DIR: "./{{.PREVIOUS_VERSION}}"
  XMI: "{{.VERSION_DIR}}/{{.XMI_FILE}}"
  PREVIOUS_XMI: "{{.PREVIOUS_VERSION_DIR}}/{{.XMI_FILE}}"
  GGM: "{{.VERSION_DIR}}/{{.GGM_FILE}}"
  PREVIOUS_GGM: "{{.PREVIOUS_VERSION_DIR}}/{{.GGM_FILE}}"
  EXCEL: "{{.VERSION_DIR}}/{{.EXCEL_FILE}}"
  LOD: "{{.VERSION_DIR}}/{{.LOD_FILE}}"
  MIM: "{{.VERSION_DIR}}/{{.GGM_MIM_FILE}}"
  TRANSLATIONS_DIR: "{{.VERSION_DIR}}/{{.TRANSLATIONS_DIR}}"
  i18N_FILE: "{{.TRANSLATIONS_DIR}}/{{.i18N_FILE}}"
  GGM_ROOT_SCHEMA: "GGM_ROOT_SCHEMA"
  GGM_PREVIOUS_SCHEMA_RAW: "GGM_PREVIOUS_SCHEMA_RAW"
  GGM_PREVIOUS_SCHEMA: "GGM_PREVIOUS_SCHEMA"
  CRUNCH_UML_DB: "./crunch_uml.db"
  # crunch_uml draait in een eigen venv (eigen site-packages) i.p.v. de systeem-homebrew-python,
  # zodat een 'brew upgrade python' de pipeline niet meer breekt. Zie taak prepare:venv-crunch.
  CRUNCH_UML_VERSION: "0.4.11"
  CRUNCH_VENV: "tools/.venv-crunch"
  CRUNCH: "tools/.venv-crunch/bin/crunch_uml"
  DOCS: "./docs"
  DEFS: "./docs/definities"
  PUBLISH: "false"
  ROOT_GGM: "{{.ROOT_NODE_GGM}}"
  CHANGES_MD: "{{.VERSION_DIR}}/{{.CHANGES_MD_FILE}}"

tasks:
  # ==========================================================================
  # Prepare; voorwaarden valideren
  # ==========================================================================
  prepare:check-tools:
    desc: "Check for pre conditions. Verify required tools are installed."
    cmds:
      - |
        # Lijst van vereiste tools en hun download-URLs.
        # crunch_uml staat hier NIET meer in: dat draait in een eigen venv (prepare:venv-crunch).
        declare -A tools=(
          ["mkdocs"]="https://www.mkdocs.org"
          ["mike"]="https://github.com/jimporter/mike"
          ["jq"]="https://stedolan.github.io/jq"
        )

        # Controleer of tools geïnstalleerd zijn
        missing_tools=()
        for tool in "${!tools[@]}"; do
          if ! command -v $tool &> /dev/null; then
            missing_tools+=($tool)
          fi
        done

        # Meld ontbrekende tools en geef installatie-instructies
        if [ ${#missing_tools[@]} -ne 0 ]; then
          echo "Error: The following tools are not installed:"
          for tool in "${missing_tools[@]}"; do
            echo "- $tool: ${tools[$tool]}"
          done
          echo "Please install the missing tools and try again."
          exit 1
        else
          echo "All required tools are installed."
        fi
    shell: bash

  prepare:check-vars:
    desc: "Check for pre conditions. Validate required variables VERSION and check if VERSION_DIR exist."
    cmds:
      - |
        # Valideer invoerparameters
        echo "Validating input parameter {{.VERSION}} ..."
      - |
        if [ -z "{{.VERSION}}" ]; then
          echo "Error: VERSION cannot be empty."
          exit 1
        fi
        if [[ ! "{{.VERSION}}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Error: Invalid VERSION format. Use v{number}.{number}.{number}, e.g., v2.5.1"
          exit 1
        fi
        if [ ! -d "{{.VERSION_DIR}}" ]; then
          echo "Error: Directory '{{.VERSION_DIR}}' does not exist."
          exit 1
        fi
      - |
        # Valideer invoerparameters
        echo "VERSION {{.VERSION}} and Versiondir {{.VERSION_DIR}} are valid..."
    shell: bash

  prepare:venv-crunch:
    desc: "Zorg voor een geïsoleerde venv met crunch_uml, ongevoelig voor brew-python-upgrades."
    cmds:
      - |
        # crunch_uml draait in een eigen venv ({{.CRUNCH_VENV}}) met eigen site-packages,
        # zodat 'brew upgrade python' de tool niet meer breekt. De venv wordt (her)opgebouwd
        # zodra hij ontbreekt of stuk is (bv. nadat een python-upgrade het symlink brak).
        VENV="{{.CRUNCH_VENV}}"
        if ! "$VENV/bin/python" -c "import crunch_uml" >/dev/null 2>&1; then
          echo "Aanmaken/herstellen crunch_uml-venv in $VENV (crunch_uml=={{.CRUNCH_UML_VERSION}})..."
          rm -rf "$VENV"
          { command -v python3.11 >/dev/null 2>&1 && python3.11 -m venv "$VENV"; } || python3 -m venv "$VENV"
          "$VENV/bin/python" -m pip install --quiet --upgrade pip
          "$VENV/bin/python" -m pip install --quiet "crunch_uml=={{.CRUNCH_UML_VERSION}}"
          echo "crunch_uml-venv klaar."
        fi
    shell: bash

  # ==========================================================================
  # Import; model(len) inladen in Crunch UML vanuit de XMI export
  # ==========================================================================
  import:model:
    desc: "Import the XMI file into Crunch UML Database."
    deps: [prepare:check-tools, prepare:check-vars, prepare:venv-crunch]
    cmds:
      - |
        if [ ! -f "{{.XMI}}" ]; then
          echo "Error: XMI file '{{.XMI}}' does not exist."
          exit 1
        fi
      - echo "Importing XMI file '{{.XMI}}' into Crunch UML..."
      - '{{.CRUNCH}} import -f "{{.XMI}}" -t eaxmi -db_create'
      - echo "Copying Core GGM Model to {{.GGM_ROOT_SCHEMA}}..."
      - '{{.CRUNCH}} transform -ttp copy -sch_to "{{.GGM_ROOT_SCHEMA}}" -rt_pkg "{{.ROOT_GGM}}"'
      - echo "Crunch database successfully created and setup..."
    shell: bash
    sources:
      - "{{.XMI}}"
    generates:
      - "{{.CRUNCH_UML_DB}}"
    run: when_changed

  import:previous:
    desc: "Import the XMI file of previous version {{.PREVIOUS_VERSION}} into Crunch UML Database."
    deps: [import:model]
    cmds:
      - |
        if [ ! -f "{{.PREVIOUS_XMI}}" ]; then
          echo "Error: XMI file '{{.PREVIOUS_XMI}}' does not exist."
          exit 1
        fi
      - echo "Importing XMI file '{{.PREVIOUS_XMI}}' into Crunch UML schema {{.GGM_PREVIOUS_SCHEMA_RAW}}..."
      - '{{.CRUNCH}} -sch {{.GGM_PREVIOUS_SCHEMA_RAW}} import -f "{{.PREVIOUS_XMI}}" -t eaxmi'
      - echo "Copying {{.GGM_PREVIOUS_SCHEMA_RAW}} GGM Model to {{.GGM_PREVIOUS_SCHEMA}}..."
      - '{{.CRUNCH}} transform -ttp copy -sch_from "{{.GGM_PREVIOUS_SCHEMA_RAW}}" -sch_to "{{.GGM_PREVIOUS_SCHEMA}}" -rt_pkg "{{.ROOT_GGM}}"'
      - echo "Successfully added previous schema to Crunch database..."
    shell: bash
    sources:
      - "{{.PREVIOUS_XMI}}"
      - "{{.XMI}}"
    generates:
      - "{{.CRUNCH_UML_DB}}"
    run: when_changed

  # ==========================================================================
  # Generate; artefacten genereren uit het model
  # ==========================================================================
  generate:docs:
    desc: "Generate Markdown documentation from the model."
    deps: [import:model]
    cmds:
      - echo "Generating Markdown documentation..."
      - mkdir -p "{{.DEFS}}"
      - rm -rf "{{.DEFS}}"/*.md
      - '{{.CRUNCH}} -sch "{{.GGM_ROOT_SCHEMA}}" export -t jinja2 --output_jinja2_template ggm_markdown.j2 -f "{{.DEFS}}/definitie.md" --output_jinja2_templatedir ./tools/'
      - |
        # Vervang de versies in de uitwisselspecificatie-templates
        # Loop door alle .template-bestanden in de directory en submappen
        echo "Processing template files in {{.DOCS}} ..."
        for file in $(find "{{.DOCS}}" -type f -name "*.template"); do
          # Bepaal de doelbestandnaam door ".template" te verwijderen
          output_file="${file%.template}"

          # Gebruik sed om de placeholder ###VERSION### te vervangen door de versie
          sed "s/###VERSION###/{{.VERSION}}/g" "$file" > "$output_file"

          # Geef een bericht over de verwerking
          echo "Processed $file -> $output_file"
        done
    shell: bash

  generate:translations:
    desc: "Generate translations for all in the i18n file defined languages. Using '{{.i18N_FILE}}'"
    deps: [import:model]
    cmds:
      - |
        if [ ! -f "{{.i18N_FILE}}" ]; then
          echo "Error: i18n file '{{.i18N_FILE}}' does not exist."
          exit 1
        fi

        LANGUAGES=$(jq -r 'keys[]' "{{.i18N_FILE}}")
        if [ -z "$LANGUAGES" ]; then
          echo "Error: No languages found in '{{.i18N_FILE}}'."
          exit 1
        fi

        # SPLIT GGM FILENAME
        GGM="{{.GGM}}"
        BASENAME=$(basename "$GGM")  # Extract de bestandsnaam
        FILENAME="${BASENAME%.*}"    # Extract de bestandsnaam zonder extensie

        echo "Languages: $LANGUAGES"
        mkdir -p "{{.TRANSLATIONS_DIR}}"
        for LANG in $LANGUAGES; do
          TRANSLATION_SCHEMA="translation_$LANG"
          echo "Processing language: $LANG..."
          {{.CRUNCH}} transform -ttp copy -sch_to $TRANSLATION_SCHEMA --root_package "{{.ROOT_GGM}}"
          {{.CRUNCH}} -sch $TRANSLATION_SCHEMA import -f "{{.i18N_FILE}}" -t i18n --language $LANG
          TRANSLATION_FILE="{{.TRANSLATIONS_DIR}}/${FILENAME}_${LANG}.qea"
          cp -f "{{.GGM}}" "$TRANSLATION_FILE"
          {{.CRUNCH}} -sch $TRANSLATION_SCHEMA export -f "$TRANSLATION_FILE" -t earepo --tag_strategy update
        done
    shell: bash
    sources:
      - "{{.CRUNCH_UML_DB}}"
      - "{{.i18N_FILE}}"
    generates:
     - "{{.TRANSLATIONS_DIR}}/*.qea"

  generate:excel:
    desc: "Generate the Excel specification from the model. Generating '{{.EXCEL}}'"
    deps: [import:model]
    cmds:
      - echo "Generating Excel specification..."
      - '{{.CRUNCH}} -sch "{{.GGM_ROOT_SCHEMA}}" export -t xlsx -f "{{.EXCEL}}"'
    shell: bash

  generate:lod:
    desc: "Generate the LOD specification from the model. Generating '{{.LOD}}'"
    deps: [import:model]
    cmds:
      - echo "Generating Lod specification..."
      - '{{.CRUNCH}} -sch "{{.GGM_ROOT_SCHEMA}}" export -t ttl -f "{{.LOD}}" --linked_data_namespace {{.LINKED_DATA_NS}}'
    shell: bash

  generate:mim:
    desc: "Generate MIM Version from model to repository {{.MIM}}."
    deps: [import:model]
    cmds:
      - echo "Generating MIM version in repo "{{.MIM}}"..."
      - '{{.CRUNCH}} -sch "{{.GGM_ROOT_SCHEMA}}" export -t eamimrepo -f "{{.MIM}}" --tag_strategy upsert'
    shell: bash

  generate:diff:
    desc: "Generate Changes to previous version {{.PREVIOUS_VERSION}} in Markdown file {{.CHANGES_MD}}."
    deps: [import:model, import:previous]
    cmds:
      - echo "Generating changes between version {{.PREVIOUS_VERSION}} and {{.VERSION}} in file {{.CHANGES_MD}}..."
      - '{{.CRUNCH}} -sch "{{.GGM_PREVIOUS_SCHEMA}}" export -t diff_md -f "{{.CHANGES_MD}}" --compare_schema_name "{{.GGM_ROOT_SCHEMA}}" --compare_title "Changes from {{.PREVIOUS_VERSION}} to {{.VERSION}}"'
    shell: bash

  generate:gemma:
    desc: "Genereer spec-conforme GEMMA CSV-export (objects + relations + subdomeinen) uit '{{.GGM}}'. Importeert eerst de GEMMA-gegevens (import:gemma) zodat de GEMMA-kolommen gevuld zijn; bij een onbereikbare bron wordt de import overgeslagen."
    deps: [prepare:check-vars, import:gemma]
    cmds:
      - |
        if [ ! -f "{{.GGM}}" ]; then
          echo "Error: EA-bestand '{{.GGM}}' bestaat niet."
          exit 1
        fi
      - mkdir -p "{{.VERSION_DIR}}/{{.GEMMA_DIR}}"
      - echo "Genereren van GEMMA-CSV's (objects + relations) uit '{{.GGM}}'..."
      - |
        # export_to_gemma.py leest de EA .qea (SQLite) rechtstreeks en levert de twee
        # bestanden conform de VNG-spec "GGM-GEMMA data-uitwisseling" (braced GUID's,
        # nr-kolom, associations + generalizations samen in het relatiebestand).
        # Afhankelijkheden (pandas, treelib) leven in een lokale venv.
        VENV="tools/.venv-gemma"
        if [ ! -x "$VENV/bin/python" ]; then
          echo "Aanmaken Python-venv $VENV met pandas/treelib..."
          python3 -m venv "$VENV"
          "$VENV/bin/python" -m pip install --quiet --upgrade pip
          "$VENV/bin/python" -m pip install --quiet -r tools/requirements-gemma.txt
        fi
        "$VENV/bin/python" tools/export_to_gemma.py \
          --db_uri "{{.GGM}}" \
          --output_objects "{{.VERSION_DIR}}/{{.GEMMA_DIR}}/ggm_export_objects_for_gemma.csv" \
          --output_relations "{{.VERSION_DIR}}/{{.GEMMA_DIR}}/ggm_export_relations_for_gemma.csv" \
          --output_packages "{{.VERSION_DIR}}/{{.GEMMA_DIR}}/ggm_export_subdomains_for_gemma.csv"
      - echo "Generatie gereed."
    shell: bash

  import:gemma:
    desc: "Importeer door GEMMA teruggeleverde gegevens (element + relatie) in '{{.GGM}}', zodat de GEMMA-kolommen bij de export gevuld worden. Muteert de master-.qea (maakt eerst .qea.bak)."
    deps: [prepare:check-vars]
    cmds:
      - |
        if [ ! -f "{{.GGM}}" ]; then
          echo "Error: EA-bestand '{{.GGM}}' bestaat niet."
          exit 1
        fi
      - echo "Importeren GEMMA-gegevens in '{{.GGM}}'..."
      - |
        # import_gemma.py leest de door GEMMA gepubliceerde CSV's (standaard de
        # VNG-repo) en schrijft de GEMMA-* tagged values in de EA .qea. Dezelfde venv
        # als generate:gemma (pandas). Gebruik CLI_ARGS voor opties, bv.
        # 'task import:gemma -- --dry-run' of '... --import_objects ./element.csv'.
        VENV="tools/.venv-gemma"
        if [ ! -x "$VENV/bin/python" ]; then
          echo "Aanmaken Python-venv $VENV met pandas/treelib..."
          python3 -m venv "$VENV"
          "$VENV/bin/python" -m pip install --quiet --upgrade pip
          "$VENV/bin/python" -m pip install --quiet -r tools/requirements-gemma.txt
        fi
        "$VENV/bin/python" tools/import_gemma.py --db_uri "{{.GGM}}" {{.CLI_ARGS}}
      - echo "Import gereed. Draai 'task generate:gemma' om de export met GEMMA-kolommen te verversen."
    shell: bash

  # ==========================================================================
  # Publish; documentatie publiceren
  # ==========================================================================
  publish:local:
    desc: "Build and deploy the documentation using MkDocs and Mike."
    deps: [generate:docs]
    cmds:
      - echo "Building and deploying MkDocs and Mike..."
      - mkdocs build --clean
      - mike deploy "{{.VERSION}}" latest --update-aliases
      - mike set-default latest
      - echo "Documentation deployed. Use 'mike serve' to view results..."
    shell: bash

  verify:seo:
    desc: "SEO-sanity: geen /latesten/ paden, sitemap-URLs resolveren, canonicals naar juist domein, noindex op v*-mappen."
    cmds:
      - echo "Running SEO sanity checks against ./site ..."
      - python tools/verify_seo.py site/
    shell: bash

  cleanup:ghpages:
    desc: "Schoon de pre-mike content op uit de gh-pages worktree (geef pad als CLI_ARGS)."
    cmds:
      - ./tools/cleanup_ghpages_root.sh "{{.CLI_ARGS}}"
      - ./tools/noindex_old_versions.sh "{{.CLI_ARGS}}"
    shell: bash

  publish:github:
    desc: "Publish the documentation directly to GitHub Pages."
    deps: [publish:local, verify:seo]
    prompt:
     - Dit commando publiceert de documentatie direct naar de LIVE GitHub pages. Doorgaan?
     - Weet je het zeker?
    cmds:
      - echo 'Deploying to GitHub Pages...'
      - git push origin gh-pages

  publish:test:
    desc: "Publish the documentation to test location on host {{.FTP_HOST}}"
    deps: [publish:local]
    cmds:
      - echo 'Deploying to test location...'
      - lftp -e "set ssl:verify-certificate no; cd {{.FTP_REMOTE_DIR}}; mirror -R --delete --verbose ./{{.FTP_LOCAL_DIR}} .; bye" {{.FTP_HOST}}
    shell: bash

  # ==========================================================================
  # Orchestratie
  # ==========================================================================
  full-deploy:
    desc: "Execute the entire deployment process."
    cmds:
      - task: generate:excel
      - task: generate:translations
      - task: publish:local
      - task: generate:lod
      - task: generate:mim
      - task: generate:diff
      - task: generate:gemma
      - echo "Full deployment completed."
    shell: bash

  # ==========================================================================
  # Util; hulpcommando's
  # ==========================================================================
  util:import-xlsx:
    desc: "Import an Excel file into Crunch UML Database and apply changes to the EA-repository."
    deps: [prepare:check-tools, prepare:check-vars, prepare:venv-crunch]
    cmds:
      - |
        if [ ! -f "{{.EXCEL}}" ]; then
          echo "Error: Excel file '{{.EXCEL}}' does not exist."
          exit 1
        fi
      - echo "Importing Excel file '{{.EXCEL}}' into Crunch UML..."
      - '{{.CRUNCH}} import -f "{{.EXCEL}}" -t xlsx -db_create'
      - echo "Copying Core GGM Model to {{.GGM_ROOT_SCHEMA}}..."
      - '{{.CRUNCH}} transform -ttp copy -sch_to "{{.GGM_ROOT_SCHEMA}}" -rt_pkg "{{.ROOT_GGM}}"'
      - echo "Crunch database successfully created and loaded with Excel file..."
      - echo "Loading changes into EA-repository..."
      - '{{.CRUNCH}} -sch "{{.GGM_ROOT_SCHEMA}}" export -f "{{.GGM}}" -t earepo --tag_strategy upsert'
      - echo "Data successfully loaded into repository..."
    shell: bash

  util:generate-i18n:
    desc: "Genereer vertalingen voor alle talen opgegeven in de .env variabele LANGUAGES. Output naar '{{.i18N_FILE}}'"
    deps: [import:model]
    cmds:
      - |
        if [ -z "{{.LANGUAGES}}" ]; then
          echo "Error: LANGUAGES is niet ingesteld in .env."
          exit 1
        fi

        echo "Reading GGM Datamodel {{.XMI}}..."

        for LANG in $(echo "{{.LANGUAGES}}" | tr ',' ' '); do
          for LANG in "${LANG_ARRAY[@]}"; do
            LANG=$(echo "$LANG" | xargs)  # trim spaties
            echo "Translating GGM to language $LANG..."
            {{.CRUNCH}} -sch "{{.GGM_ROOT_SCHEMA}}" export -t i18n -f "{{.i18N_FILE}}" --language "$LANG" --translate True --from_language "nl"

            if [ $? -eq 0 ]; then
              echo "Translation for language $LANG completed successfully."
            else
              echo "Error: Translation for language $LANG failed."
              exit 1
            fi
          done
        done
    env:
      LANGUAGES: "{{.LANGUAGES}}"
    sources:
      - "{{.XMI}}"
    generates:
      - "{{.i18N_FILE}}"
    shell: bash  # <-- essentieel!
